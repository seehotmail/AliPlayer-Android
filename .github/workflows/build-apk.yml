name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: API-Example
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Fix Gradle mirror
        run: sed -i "s|http://mtl-gradle-mirror.oss-cn-hangzhou.aliyuncs.com/gradle-7.0.2-bin.zip|https://services.gradle.org/distributions/gradle-7.0.2-bin.zip|g" gradle/wrapper/gradle-wrapper.properties
      - name: Install Android SDK (tools only)
        run: |
          export SDK=$HOME/android-sdk
          mkdir -p $SDK
          cd $SDK
          curl -sLo ct.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q ct.zip
          mkdir -p latest 2>/dev/null; mv cmdline-tools/* latest/ 2>/dev/null || true
          echo "SDK=$SDK" >> $GITHUB_ENV
          echo "$SDK/latest/bin" >> $GITHUB_PATH
      - name: Install SDK platforms
        if: always()
        run: |
          yes | sdkmanager --sdk_root=$SDK "platforms;android-31" "build-tools;30.0.3"
          ls $SDK/platforms/
      - name: Build APK
        if: always()
        run: |
          echo "sdk.dir=$SDK" > local.properties
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: AliPlayer-APK
          path: API-Example/*/build/outputs/apk/debug/*.apk

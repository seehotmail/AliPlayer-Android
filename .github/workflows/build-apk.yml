name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: API-Example

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix Gradle mirror
        run: |
          sed -i "s|http://mtl-gradle-mirror.oss-cn-hangzhou.aliyuncs.com/gradle-7.0.2-bin.zip|https://services.gradle.org/distributions/gradle-7.0.2-bin.zip|g" gradle/wrapper/gradle-wrapper.properties

      - name: Install Android SDK
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          mkdir -p $ANDROID_SDK_ROOT
          cd $ANDROID_SDK_ROOT
          echo "=== Downloading cmdline-tools ==="
          curl -sLo cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          echo "=== Extracting ==="
          unzip -q cmdline-tools.zip
          echo "=== Setting up ==="
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH 2>/dev/null || true
          if [ -d "cmdline-tools" ]; then
            mkdir -p latest
            mv cmdline-tools/* latest/ 2>/dev/null || true
            export PATH=$ANDROID_SDK_ROOT/latest/bin:$PATH
          fi
          which sdkmanager 2>/dev/null && echo "sdkmanager found" || echo "sdkmanager NOT found"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Install SDK platforms
        if: always()
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$ANDROID_SDK_ROOT/latest/bin:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          echo "=== Installing platforms ==="
          yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platforms;android-31" "build-tools;30.0.3" 2>&1 || echo "SDKMANAGER FAILED"
          ls $ANDROID_SDK_ROOT/platforms/ 2>/dev/null || echo "No platforms dir"

      - name: Build APK
        if: always()
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls $ANDROID_SDK_ROOT/platforms/ 2>/dev/null || echo "No platforms"
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: AliPlayer-APK
          path: API-Example/*/build/outputs/apk/debug/*.apk

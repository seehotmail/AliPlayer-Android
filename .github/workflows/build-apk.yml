name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: thyrlian/android-sdk:latest
    defaults:
      run:
        working-directory: API-Example
    steps:
      - uses: actions/checkout@v4
      - name: Fix Gradle mirror
        run: sed -i "s|http://mtl-gradle-mirror.oss-cn-hangzhou.aliyuncs.com/gradle-7.0.2-bin.zip|https://services.gradle.org/distributions/gradle-7.0.2-bin.zip|g" gradle/wrapper/gradle-wrapper.properties
      - name: Build APK
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: AliPlayer-APK
          path: API-Example/*/build/outputs/apk/debug/*.apk
